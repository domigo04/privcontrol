<!-- Nur auf mobilen Geräten Dropdown umfunktionieren -->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const angebotToggle = document.getElementById('angebotDropdown');
    const angebotMenu = document.getElementById('angebotMenu');

    function isMobile() {
      return window.innerWidth < 992;
    }

    angebotToggle.addEventListener('click', function (e) {
      if (isMobile()) {
        e.preventDefault();
        angebotMenu.classList.toggle('show');
      }
    });
  });
</script>

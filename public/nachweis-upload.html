<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Energienachweis</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

  <!-- HEADER -->
  <div id="header-placeholder"></div>

<body class="bg-light">
  <div class="container py-5">
    <h2 class="mb-4">🔧 Energienachweis & Unterlagen hochladen</h2>

    <div class="mb-3">
      <label for="nachweisDatei" class="form-label">Energienachweis (PDF, Pflicht)</label>
      <input type="file" class="form-control" id="nachweisDatei" accept=".pdf" required>
    </div>

    <div class="mb-3">
      <label for="zusatzDateien" class="form-label">Weitere Unterlagen (optional)</label>
      <input type="file" class="form-control" id="zusatzDateien" multiple accept=".pdf,.docx,.xlsx,.zip,.jpg,.png">
    </div>

    <div class="mb-3">
      <label for="lieferdatum" class="form-label">Wunsch-Lieferdatum</label>
      <input type="date" class="form-control" id="lieferdatum">
    </div>

    <button class="btn btn-success w-100" id="auftragAbsendenBtn">📤 Auftrag absenden</button>

    <div id="status" class="mt-4 text-center"></div>
  </div>
  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="js/nachweis-upload/upload.js"></script>
  
</body>
</html>
